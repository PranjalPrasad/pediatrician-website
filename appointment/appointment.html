<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Appointments · Pediatric Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/appointment/appointment.css">
</head>
<body>

<div class="dashboard">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="logo" id="sidebarToggle" title="Toggle menu" aria-label="Toggle sidebar menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2l4 4-3 3 2 2-9 9-4-4 9-9 2 2 3-3"/><path d="M8 15l1 1"/></svg>
      </button>
      <div class="brand-logo">
        <img src="/logo.png" alt="Sunshine Pediatric Clinic logo" onerror="this.style.display='none'">
      </div>
    </div>
    <div id="sidebarNav"></div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <header class="header">
      <h1>Appointments</h1>
      <div class="header-meta" id="headerMeta"></div>
    </header>

    <div class="body">
      <div class="kpi-row" id="kpiRow"></div>

      <!-- BOOK APPOINTMENT -->
      <div class="card section-card">
        <div class="section-head">
          <div>
            <div class="section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/></svg>
              Book Appointment
            </div>
            <div class="section-subtitle">Search the child, pick a doctor and time slot</div>
          </div>
        </div>

        <form id="bookingForm">
          <div class="form-grid">
            <div class="form-field full">
              <label class="form-label" for="patientSearch">Search Patient</label>
              <div class="search-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                <input class="form-input" type="text" id="patientSearch" placeholder="Type child name or patient ID..." autocomplete="off">
                <div class="suggest-list" id="suggestList"></div>
              </div>
            </div>

            <div class="form-field">
              <label class="form-label" for="doctorSelect">Doctor</label>
              <select class="form-select" id="doctorSelect"></select>
            </div>

            <div class="form-field">
              <label class="form-label" for="dateInput">Date</label>
              <input class="form-input" type="date" id="dateInput" value="2026-07-07">
            </div>

            <div class="form-field">
              <label class="form-label" for="timeInput">Time</label>
              <input class="form-input" type="time" id="timeInput" value="10:30">
            </div>

            <div class="form-field">
              <label class="form-label" for="reasonInput">Reason</label>
              <input class="form-input" type="text" id="reasonInput" placeholder="e.g. Fever, routine vaccination...">
            </div>

            <div class="form-field full">
              <label class="form-label">Priority</label>
              <div class="priority-group">
                <button type="button" class="priority-pill active" data-p="Routine">Routine</button>
                <button type="button" class="priority-pill" data-p="Urgent">Urgent</button>
                <button type="button" class="priority-pill" data-p="Emergency">Emergency</button>
              </div>
            </div>

            <div class="form-field full">
              <label class="form-label" for="notesInput">Notes</label>
              <textarea class="form-textarea" id="notesInput" placeholder="Any additional notes for the doctor or front desk..."></textarea>
            </div>
          </div>

          <div class="form-error" id="formError"></div>

          <div class="form-actions">
            <button type="button" class="btn btn-outline" id="clearFormBtn">Clear</button>
            <button type="submit" class="btn btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5 5-5.5"/></svg>
              Book Appointment
            </button>
          </div>
        </form>
      </div>

      <!-- APPOINTMENT LIST -->
      <div class="card section-card">
        <div class="section-head">
          <div>
            <div class="section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h6"/></svg>
              Appointment List
            </div>
            <div class="section-subtitle">All booked appointments across doctors</div>
          </div>
        </div>

        <div class="list-toolbar">
          <div class="list-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
            <input type="text" id="listSearch" placeholder="Search by patient, doctor or ID...">
          </div>
          <div class="status-tabs">
            <button class="status-tab active" data-status="All">All</button>
            <button class="status-tab" data-status="Upcoming">Upcoming</button>
            <button class="status-tab" data-status="Completed">Completed</button>
            <button class="status-tab" data-status="Cancelled">Cancelled</button>
            <button class="status-tab" data-status="Missed">Missed</button>
          </div>
        </div>

        <div class="table-wrap">
          <table class="appt-table">
            <thead>
              <tr>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="apptTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5 5-5.5"/></svg>
  <span id="toastMsg"></span>
</div>

<!-- MODAL OVERLAY (View / Edit / Delete) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card" id="modalCard"></div>
</div>

<script src="/appointment/appointment.js"></script>
</body>
</html>
