<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pediatric Clinic Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#6C63FF;
    --secondary:#4F8EF7;
    --accent:#A78BFA;
    --bg:#F3F1FC;
    --card:#FFFFFF;
    --success:#14B8A6;
    --warning:#FBBF24;
    --danger:#FF6F91;
    --text:#241E3D;
    --muted:#8B85A6;
    --border:#ECE8F9;
    --hover:#F1EDFC;
    --header-from:#FFFFFF;
    --header-to:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:'Inter', sans-serif;
    background:linear-gradient(135deg, #E9FBF2 0%, #EEF6F9 25%, #F1EDFC 60%, #FBEFF6 100%);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  .dashboard{
    display:flex;
    width:100%;
    min-height:100vh;
  }

  /* ============ SIDEBAR ============ */
  .sidebar{
    width:72px;
    flex-shrink:0;
    background:linear-gradient(180deg, var(--header-from), var(--header-to));
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
    gap:14px;
    overflow:hidden;
    transition:width 0.28s ease, padding 0.28s ease;
  }

  .sidebar.expanded{
    width:220px;
    align-items:stretch;
    padding:20px 14px;
    overflow-y:auto;
  }

  .sidebar-header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
    align-self:center;
    width:100%;
    justify-content:center;
    overflow:hidden;
  }

  .sidebar.expanded .sidebar-header{
    justify-content:flex-start;
  }

  .sidebar .logo{
    width:34px; height:34px;
    border-radius:50%;
    background:rgba(108,99,255,0.10);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:background 0.2s ease;
    border:none;
  }

  .sidebar .logo:hover{ background:rgba(108,99,255,0.18); }

  .brand-logo{
    display:none;
    align-items:center;
    gap:8px;
    overflow:hidden;
    white-space:nowrap;
  }

  .sidebar.expanded .brand-logo{ display:flex; }

  .brand-logo img{
    height:26px;
    width:auto;
    max-width:120px;
    object-fit:contain;
    flex-shrink:0;
  }

  .brand-logo span{
    font-size:13px;
    font-weight:700;
    color:var(--text);
    letter-spacing:0.2px;
  }

  .sidebar .nav-item{
    width:38px; height:38px;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted);
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease, width 0.2s ease;
    background:transparent;
    border:none;
    align-self:center;
    flex-shrink:0;
    gap:12px;
    overflow:hidden;
    white-space:nowrap;
    text-decoration:none;
  }

  .sidebar.expanded .nav-item{
    width:100%;
    justify-content:flex-start;
    padding:0 10px;
    align-self:stretch;
  }

  .sidebar .nav-item:hover{ background:rgba(108,99,255,0.08); }

  .sidebar .nav-item.active{
    background:var(--primary);
    color:#FFFFFF;
  }

  .sidebar svg{ width:17px; height:17px; flex-shrink:0; }

  .nav-label{
    display:none;
    font-size:13px;
    font-weight:500;
  }

  .sidebar.expanded .nav-label{ display:inline-block; }

  /* ============ MAIN COLUMN ============ */
  .main{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
  }

  .header{
    background:linear-gradient(120deg, var(--header-from), var(--header-to));
    border-bottom-right-radius:40px;
    padding:28px 32px 40px 32px;
  }

  .header h1{
    color:var(--text);
    font-size:24px;
    font-weight:700;
    margin-bottom:10px;
  }

  .header-meta{
    display:flex;
    align-items:center;
    gap:18px;
    font-size:13px;
    color:var(--muted);
    flex-wrap:wrap;
  }

  .header-meta span{
    display:flex;
    align-items:center;
    gap:6px;
  }

  .header-meta svg{ width:14px; height:14px; }

  /* ============ BODY ============ */
  .body{
    flex:1;
    padding:0 32px 32px 32px;
    margin-top:-24px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    box-shadow:0 2px 10px rgba(30,41,59,0.04);
    transition:transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.28s ease;
  }

  .card:hover{
    transform:translateY(-5px) scale(1.02);
    box-shadow:0 14px 28px rgba(30,41,59,0.12);
  }

  /* KPI ROW */
  .kpi-row{
    display:flex;
    gap:16px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }

  .kpi-card{
    flex:1;
    min-width:150px;
    padding:16px;
    transition:box-shadow 0.2s ease;
  }

  .kpi-card:hover{ box-shadow:0 6px 18px rgba(30,41,59,0.08); }

  .kpi-icon{
    width:38px; height:38px;
    border-radius:12px;
    background:var(--hover);
    color:var(--primary);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:12px;
  }

  .kpi-icon svg{ width:18px; height:18px; }

  .kpi-label{
    font-size:12px;
    font-weight:500;
    color:var(--muted);
    margin-bottom:4px;
  }

  .kpi-value{
    font-size:24px;
    font-weight:700;
    color:var(--text);
    margin-bottom:10px;
    transition:opacity 0.15s ease;
  }

  .kpi-trend-row{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .kpi-trend{
    display:flex;
    align-items:center;
    gap:3px;
    font-size:11px;
    font-weight:600;
    padding:2px 8px;
    border-radius:999px;
  }

  .kpi-trend svg{ width:12px; height:12px; }

  .kpi-trend.up{ color:var(--success); background:rgba(46,204,113,0.12); }
  .kpi-trend.down{ color:var(--danger); background:rgba(255,107,107,0.12); }

  .kpi-sub{ font-size:11px; color:var(--muted); }

  /* CHART CARDS */
  .chart-card{
    padding:20px;
    margin-bottom:20px;
  }

  .chart-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
    flex-wrap:wrap;
    gap:10px;
  }

  .chart-title{ font-size:16px; font-weight:600; color:var(--text); }
  .chart-subtitle{ font-size:12px; color:var(--muted); margin-top:2px; }

  .legend{
    display:flex;
    gap:16px;
    font-size:12px;
    color:var(--muted);
  }

  .legend span{ display:flex; align-items:center; gap:6px; transition:opacity 0.2s ease; }
  .legend span.dim{ opacity:0.35; }

  .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }

  .empty-note{
    font-size:12px;
    color:var(--muted);
    text-align:center;
    padding:20px 0;
  }

  .bottom-row{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
  }

  .bottom-row .card{
    flex:1;
    min-width:280px;
    padding:20px;
  }

  /* AXIS / CHART SVG TEXT */
  .axis-label{ font-size:10.5px; fill:var(--muted); font-family:'Inter', sans-serif; }
  .grid-line{ stroke:var(--border); stroke-width:1; }

  /* TOOLTIP */
  .chart-tooltip{
    position:absolute;
    display:none;
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    padding:6px 10px;
    font-size:11.5px;
    color:var(--text);
    box-shadow:0 4px 14px rgba(30,41,59,0.10);
    pointer-events:none;
    z-index:20;
  }

  .chart-wrap{ position:relative; }

  /* ============ FILTER PANEL ============ */
  .filters{
    width:260px;
    flex-shrink:0;
    background:var(--card);
    border-left:1px solid var(--border);
    padding:24px 20px;
    display:flex;
    flex-direction:column;
  }

  .filters-head{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:22px;
    font-size:14px;
    font-weight:600;
  }

  .filters-head svg{ width:16px; height:16px; color:var(--primary); }

  .filter-field{ margin-bottom:16px; position:relative; }

  .filter-label{
    font-size:12px;
    font-weight:500;
    color:var(--muted);
    margin-bottom:6px;
  }

  .filter-select{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 12px;
    font-size:13px;
    border:1px solid var(--border);
    border-radius:10px;
    background:var(--bg);
    color:var(--text);
    cursor:pointer;
    transition:background 0.2s ease, border-color 0.2s ease;
  }

  .filter-select:hover{ background:var(--hover); }
  .filter-select.open{ border-color:var(--primary); background:var(--hover); }
  .filter-select svg{ width:14px; height:14px; color:var(--muted); transition:transform 0.2s ease; flex-shrink:0; }
  .filter-select.open svg{ transform:rotate(180deg); }
  .filter-select span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .filter-dropdown{
    position:absolute;
    top:calc(100% + 4px);
    left:0;
    right:0;
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:0 10px 24px rgba(30,41,59,0.12);
    max-height:180px;
    overflow-y:auto;
    z-index:30;
    display:none;
  }

  .filter-dropdown.show{ display:block; }

  .filter-option{
    padding:8px 12px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    transition:background 0.15s ease;
  }

  .filter-option:hover{ background:var(--hover); }
  .filter-option.selected{ color:var(--primary); font-weight:600; background:rgba(108,99,255,0.06); }

  .filter-actions{
    display:flex;
    gap:10px;
    margin:8px 0 22px 0;
  }

  .btn{
    flex:1;
    padding:9px 0;
    font-size:13px;
    font-weight:600;
    border-radius:10px;
    cursor:pointer;
    border:none;
    transition:opacity 0.2s ease, background 0.2s ease;
  }

  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-primary:hover{ opacity:0.9; }

  .btn-outline{
    background:#fff;
    color:var(--text);
    border:1px solid var(--border);
  }
  .btn-outline:hover{ background:var(--bg); }

  .filter-status{
    font-size:11.5px;
    color:var(--primary);
    margin:-10px 0 16px 0;
    min-height:14px;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:12px;
    font-size:13px;
    color:var(--muted);
    margin-bottom:20px;
  }

  .links a{
    display:flex;
    align-items:center;
    gap:8px;
    color:inherit;
    text-decoration:none;
    transition:color 0.2s ease;
  }

  .links a:hover{ color:var(--text); }
  .links svg{ width:15px; height:15px; }

  .profile{
    margin-top:auto;
    display:flex;
    align-items:center;
    gap:10px;
    padding-top:16px;
    border-top:1px solid var(--border);
  }

  .avatar{
    width:36px; height:36px;
    border-radius:50%;
    background:var(--hover);
    color:var(--primary);
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    font-weight:600;
  }

  .profile-name{ font-size:13px; font-weight:600; color:var(--text); }
  .profile-email{ font-size:11px; color:var(--muted); }

  @media (max-width: 1100px){
    .filters{ display:none; }
  }
</style>
</head>
<body>

<div class="dashboard">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="logo" id="sidebarToggle" title="Toggle menu" aria-label="Toggle sidebar menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2l4 4-3 3 2 2-9 9-4-4 9-9 2 2 3-3"/><path d="M8 15l1 1"/></svg>
      </button>
      <!-- Logo image: replace src="logo.png" with your clinic's actual logo file -->
      <div class="brand-logo">
        <img src="/logo.png" alt="Sunshine Pediatric Clinic logo" onerror="this.style.display='none'">
      </div>
    </div>
    <!-- nav items injected by JS -->
    <div id="sidebarNav"></div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <header class="header">
      <h1>Pediatric Clinic Dashboard</h1>
      <div class="header-meta" id="headerMeta"></div>
    </header>

    <div class="body">
      <div class="kpi-row" id="kpiRow"></div>

      <div class="card chart-card">
        <div class="chart-head">
          <div>
            <div class="chart-title">Patient Visits</div>
            <div class="chart-subtitle">Monthly overview</div>
          </div>
          <div class="legend" id="lineLegend">
            <span data-key="a"><span class="dot" style="background:var(--primary)"></span>Appointments</span>
            <span data-key="v"><span class="dot" style="background:var(--secondary)"></span>Vaccinations</span>
          </div>
        </div>
        <div class="chart-wrap">
          <svg id="lineChart" width="100%" viewBox="0 0 760 240"></svg>
          <div class="chart-tooltip" id="lineTooltip"></div>
        </div>
      </div>

      <div class="bottom-row">
        <div class="card">
          <div class="chart-head">
            <div>
              <div class="chart-title">Monthly Vaccinations</div>
              <div class="chart-subtitle">By vaccine type</div>
            </div>
          </div>
          <div class="chart-wrap">
            <svg id="barChart" width="100%" viewBox="0 0 360 220"></svg>
            <div class="chart-tooltip" id="barTooltip"></div>
          </div>
        </div>

        <div class="card">
          <div class="chart-head">
            <div>
              <div class="chart-title">Patient Distribution</div>
              <div class="chart-subtitle">By state</div>
            </div>
          </div>
          <div style="display:flex; align-items:center; justify-content:center; height:220px;">
            <svg viewBox="0 0 320 340" width="200" height="220">
              <path d="M170 20 C200 25 215 45 220 65 C245 75 260 95 255 115
                       C270 130 275 150 260 165 C275 185 270 210 250 220
                       C255 245 240 265 220 270 C215 290 200 305 185 300
                       C180 315 165 325 155 315 C140 320 130 305 135 290
                       C110 285 100 265 110 250 C90 240 85 215 100 200
                       C85 185 90 160 110 150 C100 130 110 105 135 95
                       C130 75 145 55 165 50 C160 35 165 22 170 20 Z"
                fill="#F1EDFC" stroke="#ECE8F9" stroke-width="1.5" />
              <circle cx="178" cy="78" r="7" fill="#6C63FF" opacity="0.85"><title>Delhi</title></circle>
              <circle cx="140" cy="210" r="10" fill="#6C63FF" opacity="0.85"><title>Maharashtra</title></circle>
              <circle cx="150" cy="260" r="8" fill="#6C63FF" opacity="0.85"><title>Karnataka</title></circle>
              <circle cx="168" cy="305" r="7" fill="#6C63FF" opacity="0.85"><title>Tamil Nadu</title></circle>
              <circle cx="245" cy="165" r="7" fill="#6C63FF" opacity="0.85"><title>West Bengal</title></circle>
              <circle cx="95" cy="170" r="6" fill="#6C63FF" opacity="0.85"><title>Gujarat</title></circle>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ FILTER PANEL ============ -->
  <aside class="filters">
    <div class="filters-head" id="filtersHead"></div>
    <div id="filterFields"></div>
    <div class="filter-status" id="filterStatus"></div>
    <div class="filter-actions">
      <button class="btn btn-primary" id="applyBtn">Apply</button>
      <button class="btn btn-outline" id="resetBtn">Reset</button>
    </div>
    <div class="links" id="linksList"></div>
    <div class="profile">
      <div class="avatar">AS</div>
      <div>
        <div class="profile-name">Dr. Ananya Sharma</div>
        <div class="profile-email">ananya.sharma@clinic.com</div>
      </div>
    </div>
  </aside>

</div>

<script>

   ICON LIBRARY (minimal hand-drawn stroke icons, lucide-like)

/* =========================================================

========================================================= */
function renderKPIs(){
  const factor = doctorFactor[filterState.doctor] * genderFactor[filterState.gender] * ageFactor[filterState.age];
  const kpiRow = document.getElementById("kpiRow");
  kpiRow.innerHTML = "";
  kpis.forEach(k => {
    const displayVal = Math.max(1, Math.round(k.base * factor));
    const div = document.createElement("div");
    div.className = "card kpi-card";
    div.innerHTML = `
      <div class="kpi-icon">${k.icon}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${displayVal.toLocaleString('en-IN')}</div>
      <div class="kpi-trend-row">
        <span class="kpi-trend ${k.up ? "up" : "down"}">${k.up ? ICON.trendUp : ICON.trendDown} ${k.trend}</span>
        <span class="kpi-sub">${k.sub}</span>
      </div>
    `;
    kpiRow.appendChild(div);
  });
}

/* =========================================================
   FILTER FIELDS: custom dropdowns
========================================================= */
const filterFields = document.getElementById("filterFields");

function closeAllDropdowns(except){
  document.querySelectorAll(".filter-dropdown").forEach(dd => {
    if (dd !== except) dd.classList.remove("show");
  });
  document.querySelectorAll(".filter-select").forEach(sel => {
    if (sel.nextElementSibling !== except) sel.classList.remove("open");
  });
}

filters.forEach(f => {
  const field = document.createElement("div");
  field.className = "filter-field";

  const select = document.createElement("div");
  select.className = "filter-select";
  select.innerHTML = `<span>${filterState[f.key]}</span>${ICON.chevron}`;

  const dropdown = document.createElement("div");
  dropdown.className = "filter-dropdown";
  f.options.forEach(opt => {
    const optEl = document.createElement("div");
    optEl.className = "filter-option" + (opt === filterState[f.key] ? " selected" : "");
    optEl.textContent = opt;
    optEl.addEventListener("click", (e) => {
      e.stopPropagation();
      filterState[f.key] = opt;
      select.querySelector("span").textContent = opt;
      dropdown.querySelectorAll(".filter-option").forEach(o => o.classList.remove("selected"));
      optEl.classList.add("selected");
      dropdown.classList.remove("show");
      select.classList.remove("open");
    });
    dropdown.appendChild(optEl);
  });

  select.addEventListener("click", (e) => {
    e.stopPropagation();
    const isOpen = dropdown.classList.contains("show");
    closeAllDropdowns();
    if (!isOpen){
      dropdown.classList.add("show");
      select.classList.add("open");
    }
  });

  const label = document.createElement("div");
  label.className = "filter-label";
  label.textContent = f.label;

  field.appendChild(label);
  field.appendChild(select);
  field.appendChild(dropdown);
  filterFields.appendChild(field);
});

document.addEventListener("click", () => closeAllDropdowns());

  const active = filters.filter(f => filterState[f.key] !== f.options[0]);
  if (active.length === 0) return "Showing all data (no filters applied).";
  return "Filtered by " + active.map(f => `${f.label.toLowerCase()}: ${filterState[f.key]}`).join(", ") + ".";

}

/* =========================================================
   LINE CHART (Patient Visits) — redrawable
========================================================= */
function drawLineChart(data, visitType){
  const svg = document.getElementById("lineChart");
  const tooltip = document.getElementById("lineTooltip");
  const W = 760, H = 240, padL = 30, padR = 10, padT = 10, padB = 24;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  const showA = visitType === "All" || visitType === "Appointments";
  const showV = visitType === "All" || visitType === "Vaccinations";

  // legend dimming
  document.querySelectorAll('#lineLegend span').forEach(el => {
    const key = el.getAttribute('data-key');
    const visible = (key === 'a' && showA) || (key === 'v' && showV);
    el.classList.toggle('dim', !visible);
  });

  if (!data.length){
    svg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" class="axis-label">No data for this filter</text>`;
    tooltip.style.display = "none";
    return;
  }

  const relevantVals = data.flatMap(d => [showA ? d.a : 0, showV ? d.v : 0]);
  const maxVal = Math.max(...relevantVals, 1) * 1.15;
  const stepX = data.length > 1 ? plotW / (data.length - 1) : 0;
  const singlePoint = data.length === 1;

  const xy = (i, val) => {
    const x = singlePoint ? padL + plotW / 2 : padL + i * stepX;
    const y = padT + plotH - (val / maxVal) * plotH;
    return [x, y];
  };

  let svgHTML = "";

  const gridCount = 4;
  for (let g = 0; g <= gridCount; g++) {
    const y = padT + (plotH / gridCount) * g;
    svgHTML += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" class="grid-line"/>`;
  }

  data.forEach((d, i) => {
    const [x] = xy(i, 0);
    svgHTML += `<text x="${x}" y="${H - 4}" text-anchor="middle" class="axis-label">${d.m}</text>`;
  });

  const buildPath = (key) => data.map((d, i) => {
    const [x, y] = xy(i, d[key]);
    return (i === 0 ? "M" : "L") + x.toFixed(1) + " " + y.toFixed(1);
  }).join(" ");

  const dots = (key, color) => data.map((d, i) => {
    const [x, y] = xy(i, d[key]);
    return `<circle class="pt" data-key="${key}" data-i="${i}" cx="${x}" cy="${y}" r="3.5" fill="${color}" style="cursor:pointer"/>`;
  }).join("");

  if (showA && !singlePoint) svgHTML += `<path d="${buildPath('a')}" fill="none" stroke="var(--primary)" stroke-width="2.5"/>`;
  if (showV && !singlePoint) svgHTML += `<path d="${buildPath('v')}" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>`;
  if (showA) svgHTML += dots('a', '#6C63FF');
  if (showV) svgHTML += dots('v', '#4F8EF7');

  svg.innerHTML = svgHTML;

  svg.querySelectorAll(".pt").forEach(pt => {
    pt.addEventListener("mousemove", (e) => {
      const i = pt.getAttribute("data-i");
      const key = pt.getAttribute("data-key");
      const d = data[i];
      const label = key === "a" ? "Appointments" : "Vaccinations";
      tooltip.style.display = "block";
      tooltip.style.left = e.offsetX + 12 + "px";
      tooltip.style.top = e.offsetY - 10 + "px";
      tooltip.innerHTML = `<strong>${d.m}</strong><br>${label}: ${d[key]}`;
    });
    pt.addEventListener("mouseleave", () => tooltip.style.display = "none");
  });
}

/* =========================================================
   BAR CHART (Monthly Vaccinations) — redrawable
========================================================= */
function drawBarChart(data){
  const svg = document.getElementById("barChart");
  const tooltip = document.getElementById("barTooltip");
  const W = 360, H = 220, padL = 28, padR = 8, padT = 10, padB = 24;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  if (!data.length){
    svg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" class="axis-label">No vaccines match this filter</text>`;
    tooltip.style.display = "none";
    return;
  }

  const maxVal = Math.max(...data.map(d => d.value)) * 1.2;
  const n = data.length;
  const gap = 10;
  const barW = (plotW - gap * (n - 1)) / n;

  let svgHTML = "";
  const gridCount = 4;
  for (let g = 0; g <= gridCount; g++) {
    const y = padT + (plotH / gridCount) * g;
    svgHTML += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" class="grid-line"/>`;
  }

  const points = [];
  data.forEach((d, i) => {
    const x = padL + i * (barW + gap);
    const barH = (d.value / maxVal) * plotH;
    const y = padT + plotH - barH;
    svgHTML += `<rect class="bar" data-i="${i}" x="${x}" y="${y}" width="${barW}" height="${barH}" rx="6" fill="var(--accent)" style="cursor:pointer"/>`;
    svgHTML += `<text x="${x + barW/2}" y="${H - 4}" text-anchor="middle" class="axis-label">${d.name}</text>`;
    points.push([x + barW/2, y]);
  });

  const linePath = points.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  svgHTML += `<path d="${linePath}" fill="none" stroke="var(--text)" stroke-width="1.5"/>`;
  points.forEach(p => {
    svgHTML += `<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="var(--text)"/>`;
  });

  svg.innerHTML = svgHTML;

  svg.querySelectorAll(".bar").forEach(bar => {
    bar.addEventListener("mousemove", (e) => {
      const i = bar.getAttribute("data-i");
      const d = data[i];
      tooltip.style.display = "block";
      tooltip.style.left = e.offsetX + 12 + "px";
      tooltip.style.top = e.offsetY - 10 + "px";
      tooltip.innerHTML = `<strong>${d.name}</strong><br>Doses: ${d.value}<br>Status: ${d.status}`;
    });
    bar.addEventListener("mouseleave", () => tooltip.style.display = "none");
  });
}
