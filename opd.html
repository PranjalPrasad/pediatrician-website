<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OPD Consultation · Pediatric Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  :root{
    --primary:#6C63FF;
    --secondary:#4F8EF7;
    --accent:#A78BFA;
    --bg:#F3F1FC;
    --card:#FFFFFF;
    --success:#14B8A6;
    --warning:#FBBF24;
    --danger:#FF6F91;
    --text:#241E3D;
    --muted:#8B85A6;
    --border:#ECE8F9;
    --hover:#F1EDFC;
    --header-from:#FFFFFF;
    --header-to:#FFFFFF;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Inter', sans-serif;
    background:linear-gradient(135deg, #E9FBF2 0%, #EEF6F9 25%, #F1EDFC 60%, #FBEFF6 100%);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .dashboard{ display:flex; width:100%; min-height:100vh; }
  .sidebar{
    width:72px; flex-shrink:0;
    background:linear-gradient(180deg, var(--header-from), var(--header-to));
    border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center;
    padding:20px 0; gap:14px; overflow:hidden;
    transition:width 0.28s ease, padding 0.28s ease;
  }
  .sidebar.expanded{ width:210px; align-items:stretch; padding:20px 14px; }
  .sidebar .logo{
    width:34px; height:34px; border-radius:50%;
    background:rgba(108,99,255,0.10);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:8px; cursor:pointer; flex-shrink:0;
    transition:background 0.2s ease; border:none; align-self:center;
  }
  .sidebar .logo:hover{ background:rgba(108,99,255,0.18); }
  .sidebar.expanded .logo{ align-self:flex-start; }
  .sidebar .nav-item{
    width:38px; height:38px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted); cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease, width 0.2s ease;
    background:transparent; border:none; align-self:center; flex-shrink:0;
    gap:12px; overflow:hidden; white-space:nowrap; text-decoration:none;
  }
  .sidebar.expanded .nav-item{ width:100%; justify-content:flex-start; padding:0 10px; align-self:stretch; }
  .sidebar .nav-item:hover{ background:rgba(108,99,255,0.08); }
  .sidebar .nav-item.active{ background:var(--primary); color:#FFFFFF; }
  .sidebar svg{ width:17px; height:17px; flex-shrink:0; }
  .nav-label{ display:none; font-size:13px; font-weight:500; }
  .sidebar.expanded .nav-label{ display:inline-block; }
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .header{
    background:linear-gradient(120deg, var(--header-from), var(--header-to));
    border-bottom-right-radius:40px;
    padding:28px 32px 24px 32px;
    display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px;
  }
  .header h1{ color:var(--text); font-size:24px; font-weight:700; margin-bottom:6px; }
  .header-sub{ font-size:13px; color:var(--muted); }
  .header-meta{ display:flex; align-items:center; gap:18px; font-size:13px; color:var(--muted); flex-wrap:wrap; }
  .header-meta span{ display:flex; align-items:center; gap:6px; }
  .header-meta svg{ width:14px; height:14px; }
  .body{ flex:1; padding:24px 32px 32px 32px; }
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    box-shadow:0 2px 10px rgba(30,41,59,0.04);
    transition:transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.28s ease;
  }
  .card:hover{ transform:translateY(-5px) scale(1.02); box-shadow:0 14px 28px rgba(30,41,59,0.12); }
  .kpi-row{ display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
  .kpi-card{ flex:1; min-width:170px; padding:16px; }
  .kpi-icon{
    width:38px; height:38px; border-radius:12px; background:var(--hover); color:var(--primary);
    display:flex; align-items:center; justify-content:center; margin-bottom:12px;
  }
  .kpi-icon svg{ width:18px; height:18px; }
  .kpi-label{ font-size:12px; font-weight:500; color:var(--muted); margin-bottom:4px; }
  .kpi-value{ font-size:24px; font-weight:700; color:var(--text); }
  .btn{ padding:9px 16px; font-size:13px; font-weight:600; border-radius:10px; cursor:pointer; border:none; transition:opacity 0.2s ease, background 0.2s ease; display:inline-flex; align-items:center; gap:6px; }
  .btn svg{ width:14px; height:14px; }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-primary:hover{ opacity:0.9; }
  .btn-outline{ background:#fff; color:var(--text); border:1px solid var(--border); }
  .btn-outline:hover{ background:var(--bg); }
  .btn-sm{ padding:6px 12px; font-size:12px; }
  .chart-card{ padding:20px; margin-bottom:20px; }
  .chart-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .chart-title{ font-size:16px; font-weight:600; color:var(--text); }
  .chart-subtitle{ font-size:12px; color:var(--muted); margin-top:2px; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:0.03em; color:var(--muted); font-weight:600; padding:10px 12px; border-bottom:1px solid var(--border); }
  td{ padding:12px; border-bottom:1px solid var(--border); color:var(--text); }
  tr:last-child td{ border-bottom:none; }
  tr:hover td{ background:var(--hover); }
  .badge{ display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600; }
  .badge-success{ background:rgba(20,184,166,0.12); color:var(--success); }
  .badge-warning{ background:rgba(251,191,36,0.15); color:#B7791F; }
  .badge-danger{ background:rgba(255,111,145,0.12); color:var(--danger); }
  .badge-info{ background:rgba(79,142,247,0.12); color:var(--secondary); }
  .badge-neutral{ background:var(--hover); color:var(--muted); }
  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field.full{ grid-column:1/-1; }
  .field label{ font-size:12px; font-weight:600; color:var(--muted); }
  .field input, .field select, .field textarea{
    padding:10px 12px; border:1px solid var(--border); border-radius:10px; font-size:13px;
    font-family:inherit; color:var(--text); background:var(--bg);
  }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--primary); background:#fff; }
  .field textarea{ resize:vertical; min-height:70px; }
  .tabs{ display:flex; gap:6px; border-bottom:1px solid var(--border); margin-bottom:20px; flex-wrap:wrap; }
  .tab{ padding:10px 16px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
  .tab.active{ color:var(--primary); border-bottom-color:var(--primary); }
  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }
  .search-bar{ display:flex; align-items:center; gap:8px; padding:9px 14px; border:1px solid var(--border); border-radius:10px; background:#fff; min-width:220px; }
  .search-bar svg{ width:15px; height:15px; color:var(--muted); }
  .search-bar input{ border:none; outline:none; font-size:13px; flex:1; font-family:inherit; color:var(--text); }
  .toolbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .chips{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{ padding:7px 14px; font-size:12px; font-weight:600; border-radius:999px; background:var(--hover); color:var(--muted); cursor:pointer; border:1px solid transparent; }
  .chip.active{ background:var(--primary); color:#fff; }
  .avatar-sm{ width:32px; height:32px; border-radius:50%; background:var(--hover); color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
  .name-cell{ display:flex; align-items:center; gap:10px; }
  .steps{ display:flex; align-items:center; gap:0; margin-bottom:28px; }
  .step{ display:flex; align-items:center; gap:10px; flex:1; }
  .step-circle{ width:30px; height:30px; border-radius:50%; background:var(--hover); color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
  .step.done .step-circle{ background:var(--success); color:#fff; }
  .step.active .step-circle{ background:var(--primary); color:#fff; }
  .step-label{ font-size:12.5px; font-weight:600; color:var(--muted); }
  .step.active .step-label, .step.done .step-label{ color:var(--text); }
  .step-line{ flex:1; height:2px; background:var(--border); margin:0 8px; }
  .section-title{ font-size:14px; font-weight:700; color:var(--text); margin:22px 0 12px; }
  .section-title:first-child{ margin-top:0; }
  .info-list{ display:grid; grid-template-columns:1fr 1fr; gap:14px 24px; }
  .info-item .k{ font-size:11.5px; color:var(--muted); margin-bottom:2px; }
  .info-item .v{ font-size:13.5px; font-weight:600; color:var(--text); }
  .empty-hint{ font-size:12px; color:var(--muted); text-align:center; padding:24px; }
  .divider{ height:1px; background:var(--border); margin:18px 0; }
  @media (max-width:900px){ .form-grid, .info-list{ grid-template-columns:1fr; } }

</style>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar" id="sidebar">
    <button class="logo" id="sidebarToggle" title="Toggle menu" aria-label="Toggle sidebar menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2l4 4-3 3 2 2-9 9-4-4 9-9 2 2 3-3"/><path d="M8 15l1 1"/></svg>
    </button>
    <div id="sidebarNav"></div>
  </aside>
  <div class="main">
    <header class="header">
      <div>
        <h1>OPD Consultation</h1>
        <div class="header-sub">Record chief complaint, diagnosis and prescription for this visit</div>
      </div>
    </header>
    <div class="body">
      
<div class="card" style="padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;">
  <div class="avatar-sm" style="width:44px;height:44px;">AV</div>
  <div>
    <div style="font-weight:700;font-size:14.5px;">Ayaan Verma <span style="font-weight:600;color:var(--muted);font-size:12px;">· PED-1042 · 2y 3m · Male</span></div>
    <div style="font-size:12px;color:var(--muted);">Last visit: 15 Jun 2026 · No known allergies</div>
  </div>
</div>
<div class="card" style="padding:24px 28px;max-width:900px;">
  <div class="section-title">Visit details</div>
  <div class="form-grid">
    <div class="field"><label>Visit Date</label><input type="date"></div>
    <div class="field"><label>Doctor</label><select><option>Dr. Ananya Sharma</option><option>Dr. Rohan Mehta</option></select></div>
    <div class="field full"><label>Chief Complaint</label><input placeholder="e.g. Fever and cough since 2 days"></div>
    <div class="field full"><label>Symptoms</label><input placeholder="e.g. Fever, cough, runny nose, poor appetite"></div>
    <div class="field full"><label>Diagnosis</label><input placeholder="e.g. Viral upper respiratory infection"></div>
    <div class="field full"><label>Doctor Notes</label><textarea placeholder="Examination findings, advice given"></textarea></div>
    <div class="field"><label>Follow-up Date</label><input type="date"></div>
  </div>

  <div class="section-title">Prescription</div>
  <div class="card" style="padding:8px;box-shadow:none;">
    <table>
      <thead><tr><th>Medicine</th><th>Dosage</th><th>Duration</th><th>Instructions</th></tr></thead>
      <tbody id="rxRows"></tbody>
    </table>
  </div>
  <button class="btn btn-outline btn-sm" style="margin-top:10px;" onclick="addRx()"><span></span>Add Medicine</button>

  <div class="divider"></div>
  <div style="display:flex; justify-content:flex-end; gap:10px;">
    <button class="btn btn-outline">Save Visit</button>
    <a href="prescription.html" class="btn btn-primary"><span></span>Save &amp; Print Prescription</a>
  </div>
</div>

    </div>
  </div>
</div>
<script>

const ICON = {
  home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>`,
  users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.5 3-6 6.5-6s6.5 2.5 6.5 6"/><circle cx="17" cy="9" r="2.6"/><path d="M15 20c0-2.4 1-4.2 2.7-5.2"/></svg>`,
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/></svg>`,
  syringe: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2l4 4-3 3-2-2"/><path d="M17 7l-9.5 9.5"/><path d="M4 20l2.5-2.5"/><path d="M9 12l3 3M11 10l3 3"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5 5-5.5"/></svg>`,
  ruler: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="8" rx="1.5"/><path d="M7 8v3M11 8v3M15 8v3"/></svg>`,
  activity: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 7 4-14 2 7h6"/></svg>`,
  clipboard: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h6"/></svg>`,
  file: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h9l5 5v15H6z"/><path d="M15 2v5h5"/></svg>`,
  receipt: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2h14v20l-3-2-2 2-2-2-2 2-2-2-3 2z"/><path d="M8 8h8M8 12h8"/></svg>`,
  settings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a7.7 7.7 0 000-3l2-1.5-2-3.4-2.3.9a7.5 7.5 0 00-2.6-1.5L14 2h-4l-.5 2.5a7.5 7.5 0 00-2.6 1.5l-2.3-.9-2 3.4 2 1.5a7.7 7.7 0 000 3l-2 1.6 2 3.4 2.3-1a7.5 7.5 0 002.6 1.5L10 22h4l.5-2.5a7.5 7.5 0 002.6-1.5l2.3 1 2-3.4z"/></svg>`,
  user: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/></svg>`,
  plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>`,
  search: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>`,
  chevron: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>`,
  print: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6"/><rect x="4" y="9" width="16" height="8" rx="1"/><path d="M6 17v4h12v-4"/></svg>`,
  eye: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>`,
  bell: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>`,
  edit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>`,
  download: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>`
};

const sidebarItems = [
  { icon: ICON.home, label: "Dashboard", href: "dashboard.html" },
  { icon: ICON.user, label: "Patients", href: "patients.html" },
  { icon: ICON.calendar, label: "Appointments", href: "appointments.html" },
  { icon: ICON.syringe, label: "Vaccinations", href: "vaccination-schedule.html" },
  { icon: ICON.activity, label: "Growth", href: "growth-monitoring.html" },
  { icon: ICON.clipboard, label: "Prescriptions", href: "prescription.html" },
  { icon: ICON.file, label: "Reports", href: "reports.html" },
  { icon: ICON.receipt, label: "Billing", href: "billing.html" },
  { icon: ICON.settings, label: "User Management", href: "user-management.html" },
  { icon: ICON.user, label: "Profile", href: "#" }
];
const sidebarNav = document.getElementById("sidebarNav");
sidebarNav.style.display = "contents";
sidebarItems.forEach(item => {
  const a = document.createElement("a");
  a.className = "nav-item" + (item.label === "Appointments" ? " active" : "");
  a.title = item.label;
  a.href = item.href;
  a.innerHTML = item.icon + `<span class="nav-label">${item.label}</span>`;
  sidebarNav.appendChild(a);
});
const sidebar = document.getElementById("sidebar");
document.getElementById("sidebarToggle").addEventListener("click", () => sidebar.classList.toggle("expanded"));

function addRx(){
  const tr=document.createElement("tr");
  tr.innerHTML = `
    <td><input placeholder="e.g. Paracetamol Syrup" style="border:1px solid var(--border);border-radius:8px;padding:6px 8px;width:100%;font-size:12.5px;"></td>
    <td><input placeholder="e.g. 5ml" style="border:1px solid var(--border);border-radius:8px;padding:6px 8px;width:100%;font-size:12.5px;"></td>
    <td><input placeholder="e.g. 5 days" style="border:1px solid var(--border);border-radius:8px;padding:6px 8px;width:100%;font-size:12.5px;"></td>
    <td><input placeholder="e.g. After food, twice daily" style="border:1px solid var(--border);border-radius:8px;padding:6px 8px;width:100%;font-size:12.5px;"></td>
  `;
  document.getElementById("rxRows").appendChild(tr);
}
addRx(); addRx();

</script>
</body>
</html>
