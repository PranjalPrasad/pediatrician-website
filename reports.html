<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reports | Pediatric Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<style>
  :root{
    --primary:#6C63FF;
    --secondary:#4F8EF7;
    --accent:#A78BFA;
    --bg:#F3F1FC;
    --card:#FFFFFF;
    --success:#14B8A6;
    --warning:#FBBF24;
    --danger:#FF6F91;
    --text:#241E3D;
    --muted:#8B85A6;
    --border:#ECE8F9;
    --hover:#F1EDFC;
    --header-from:#FFFFFF;
    --header-to:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:'Inter', sans-serif;
    background:linear-gradient(135deg, #E9FBF2 0%, #EEF6F9 25%, #F1EDFC 60%, #FBEFF6 100%);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  .dashboard{ display:flex; width:100%; min-height:100vh; }

  /* ============ SIDEBAR ============ */
  .sidebar{
    width:72px; flex-shrink:0;
    background:linear-gradient(180deg, var(--header-from), var(--header-to));
    border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center;
    padding:20px 0; gap:14px; overflow:hidden;
    transition:width 0.28s ease, padding 0.28s ease;
  }
  .sidebar.expanded{ width:220px; align-items:stretch; padding:20px 14px; overflow-y:auto; }
  .sidebar-header{ display:flex; align-items:center; gap:10px; margin-bottom:8px; align-self:center; width:100%; justify-content:center; overflow:hidden; }
  .sidebar.expanded .sidebar-header{ justify-content:flex-start; }
  .sidebar .logo{ width:34px; height:34px; border-radius:50%; background:rgba(108,99,255,0.10); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background 0.2s ease; border:none; }
  .sidebar .logo:hover{ background:rgba(108,99,255,0.18); }
  .brand-logo{ display:none; align-items:center; gap:8px; overflow:hidden; white-space:nowrap; }
  .sidebar.expanded .brand-logo{ display:flex; }
  .brand-logo img{ height:26px; width:auto; max-width:120px; object-fit:contain; flex-shrink:0; }
  .brand-logo span{ font-size:13px; font-weight:700; color:var(--text); letter-spacing:0.2px; }

  .sidebar .nav-item{
    width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); cursor:pointer; transition:background 0.2s ease, color 0.2s ease, width 0.2s ease;
    background:transparent; border:none; align-self:center; flex-shrink:0; gap:12px; overflow:hidden;
    white-space:nowrap; text-decoration:none;
  }
  .sidebar.expanded .nav-item{ width:100%; justify-content:flex-start; padding:0 10px; align-self:stretch; }
  .sidebar .nav-item:hover{ background:rgba(108,99,255,0.08); }
  .sidebar .nav-item.active{ background:var(--primary); color:#FFFFFF; }
  .sidebar svg{ width:17px; height:17px; flex-shrink:0; }
  .nav-label{ display:none; font-size:13px; font-weight:500; }
  .sidebar.expanded .nav-label{ display:inline-block; }

  .nav-group{ width:100%; display:flex; flex-direction:column; align-items:center; }
  .sidebar.expanded .nav-group{ align-items:stretch; }
  .nav-parent{
    width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); cursor:pointer; transition:background 0.2s ease, color 0.2s ease, width 0.2s ease;
    background:transparent; border:none; align-self:center; flex-shrink:0; gap:12px; overflow:hidden;
    white-space:nowrap; text-decoration:none;
  }
  .sidebar.expanded .nav-parent{ width:100%; justify-content:flex-start; padding:0 10px; align-self:stretch; }
  .nav-parent:hover{ background:rgba(108,99,255,0.08); }
  .nav-parent.active{ background:var(--primary); color:#FFFFFF; }
  .nav-parent .nav-chevron{ display:none; margin-left:auto; transition:transform 0.2s ease; width:12px; height:12px; }
  .sidebar.expanded .nav-parent .nav-chevron{ display:inline-block; }
  .nav-parent.open .nav-chevron{ transform:rotate(180deg); }
  .nav-submenu{ display:none; flex-direction:column; gap:4px; padding-left:10px; margin-top:2px; }
  .sidebar.expanded .nav-group.open .nav-submenu{ display:flex; }
  .nav-subitem{ display:flex; align-items:center; gap:10px; padding:7px 10px 7px 28px; border-radius:10px; font-size:12.5px; color:var(--muted); text-decoration:none; transition:background 0.2s ease, color 0.2s ease; }
  .nav-subitem:hover{ background:rgba(108,99,255,0.08); color:var(--text); }
  .nav-subitem.active{ background:var(--hover); color:var(--primary); font-weight:600; }
  .nav-subitem .dot-sm{ width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }

  /* ============ MAIN ============ */
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .header{ background:linear-gradient(120deg, var(--header-from), var(--header-to)); border-bottom-right-radius:40px; padding:28px 32px 40px 32px; }
  .header h1{ color:var(--text); font-size:24px; font-weight:700; margin-bottom:10px; }
  .header-meta{ display:flex; align-items:center; gap:18px; font-size:13px; color:var(--muted); flex-wrap:wrap; }
  .header-meta span{ display:flex; align-items:center; gap:6px; }
  .header-meta svg{ width:14px; height:14px; flex-shrink:0; }

  .body{ flex:1; padding:0 32px 32px 32px; margin-top:-24px; min-width:0; }

  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    box-shadow:0 2px 10px rgba(30,41,59,0.04);
    transition:transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.28s ease;
  }

  /* ============ REPORT CARDS ============ */
  .report-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:16px;
    margin-bottom:24px;
  }
  .report-card{
    padding:18px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:14px;
    border:1px solid var(--border);
    position:relative;
  }
  .report-card:hover{ transform:translateY(-4px); box-shadow:0 14px 28px rgba(30,41,59,0.10); }
  .report-card.active{ border-color:var(--primary); box-shadow:0 8px 22px rgba(108,99,255,0.16); background:linear-gradient(180deg,#FFFFFF,var(--hover)); }
  .report-card.active::after{
    content:""; position:absolute; top:14px; right:14px; width:8px; height:8px; border-radius:50%; background:var(--primary);
  }

  .report-icon{
    width:44px; height:44px; border-radius:12px; background:var(--hover); color:var(--primary);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .report-card.active .report-icon{ background:var(--primary); color:#fff; }
  .report-icon svg{ width:19px; height:19px; }

  .report-card-body{ min-width:0; }
  .report-card-count{ font-size:21px; font-weight:700; color:var(--text); line-height:1.15; }
  .report-card-title{ font-size:13.5px; font-weight:600; color:var(--text); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .report-card-sub{ font-size:11.5px; color:var(--muted); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* ============ REPORT DETAIL PANEL ============ */
  .report-panel{ padding:22px; }
  .report-panel-head{
    display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:18px;
  }
  .report-panel-title{ font-size:17px; font-weight:700; color:var(--text); }
  .report-panel-sub{ font-size:12.5px; color:var(--muted); margin-top:3px; }

  .report-actions{ display:flex; gap:10px; flex-wrap:wrap; }
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    padding:9px 16px; font-size:13px; font-weight:600; border-radius:10px; cursor:pointer; border:none;
    transition:opacity 0.2s ease, background 0.2s ease, transform 0.15s ease;
    white-space:nowrap;
  }
  .btn:active{ transform:scale(0.97); }
  .btn:disabled{ opacity:0.45; cursor:not-allowed; }
  .btn svg{ width:14px; height:14px; flex-shrink:0; }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-primary:hover{ opacity:0.9; }
  .btn-outline{ background:#fff; color:var(--text); border:1px solid var(--border); }
  .btn-outline:hover{ background:var(--bg); }
  .btn-success{ background:var(--success); color:#fff; }
  .btn-success:hover{ opacity:0.9; }
  .btn-sm{ padding:6px 10px; font-size:12px; border-radius:8px; }

  .table-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; }

  table{ width:100%; border-collapse:collapse; min-width:560px; }
  thead th{
    text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:0.4px;
    color:var(--muted); padding:10px 12px; border-bottom:1px solid var(--border); white-space:nowrap;
  }
  tbody td{ padding:12px; font-size:13px; color:var(--text); border-bottom:1px solid var(--border); white-space:nowrap; }
  tbody tr:hover{ background:var(--hover); }
  tbody tr:last-child td{ border-bottom:none; }

  .badge{
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:600;
  }
  .badge-success{ background:rgba(20,184,166,0.12); color:var(--success); }
  .badge-warning{ background:rgba(251,191,36,0.15); color:#B7791F; }
  .badge-danger{ background:rgba(255,111,145,0.12); color:var(--danger); }
  .badge-info{ background:rgba(79,142,247,0.12); color:var(--secondary); }

  .empty-note{ font-size:13px; color:var(--muted); text-align:center; padding:30px 0; }

  /* ============ PAGINATION ============ */
  .pagination{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    margin-top:16px; padding-top:14px; border-top:1px solid var(--border);
  }
  .pagination-info{ font-size:12.5px; color:var(--muted); }
  .pagination-controls{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .page-btn{
    min-width:30px; height:30px; padding:0 8px; border-radius:8px; border:1px solid var(--border);
    background:#fff; color:var(--text); font-size:12.5px; font-weight:600; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .page-btn:hover:not(:disabled){ background:var(--hover); border-color:var(--primary); }
  .page-btn.active{ background:var(--primary); border-color:var(--primary); color:#fff; }
  .page-btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .page-btn svg{ width:14px; height:14px; }

  /* ============ LOGOUT OVERLAY ============ */
  .logout-overlay{ position:fixed; inset:0; background:rgba(36,30,61,0.45); display:none; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(2px); }
  .logout-overlay.show{ display:flex; }
  .logout-modal{ background:var(--card); border-radius:18px; padding:28px; width:320px; max-width:90vw; box-shadow:0 20px 50px rgba(30,41,59,0.25); text-align:center; animation:logoutPop 0.2s ease; }
  @keyframes logoutPop{ from{ transform:scale(0.92); opacity:0; } to{ transform:scale(1); opacity:1; } }
  .logout-modal-icon{ width:52px; height:52px; border-radius:50%; background:rgba(255,111,145,0.12); color:var(--danger); display:flex; align-items:center; justify-content:center; margin:0 auto 16px auto; }
  .logout-modal-icon svg{ width:24px; height:24px; }
  .logout-modal h3{ font-size:17px; font-weight:700; color:var(--text); margin-bottom:8px; }
  .logout-modal p{ font-size:13px; color:var(--muted); margin-bottom:22px; line-height:1.5; }
  .logout-modal-actions{ display:flex; gap:10px; }
  .logout-modal-actions .btn{ flex:1; justify-content:center; }
  .btn-danger{ background:var(--danger); color:#fff; }
  .btn-danger:hover{ opacity:0.9; }

  /* ============ TOAST ============ */
  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--text); color:#fff;
    padding:12px 18px; border-radius:12px; font-size:13px; font-weight:500;
    box-shadow:0 10px 30px rgba(0,0,0,0.2); display:flex; align-items:center; gap:8px;
    transform:translateY(20px); opacity:0; pointer-events:none; transition:all 0.25s ease; z-index:2000;
    max-width:calc(100vw - 32px);
  }
  .toast.show{ transform:translateY(0); opacity:1; }
  .toast svg{ width:16px; height:16px; color:var(--success); flex-shrink:0; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 1024px){
    .header{ padding:24px 24px 36px; }
    .body{ padding:0 24px 24px; }
  }

  @media (max-width: 720px){
    .report-panel-head{ flex-direction:column; }
    .report-actions{ width:100%; }
    .report-actions .btn{ flex:1; justify-content:center; }
    .header{ padding:20px 18px 30px; border-bottom-right-radius:24px; }
    .header h1{ font-size:20px; }
    .body{ padding:0 14px 20px; }
    .report-grid{ grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px; }
    .report-card{ padding:14px; gap:10px; }
    .report-icon{ width:38px; height:38px; }
    .report-card-count{ font-size:18px; }
    .pagination{ justify-content:center; }
    .pagination-info{ width:100%; text-align:center; }
  }

  @media (max-width: 480px){
    .sidebar{ width:56px; }
    .sidebar.expanded{ position:fixed; top:0; left:0; height:100vh; z-index:999; width:78vw; max-width:240px; box-shadow:0 0 30px rgba(0,0,0,0.18); }
    .header-meta{ gap:10px; font-size:12px; }
    .report-grid{ grid-template-columns:1fr 1fr; }
    .report-panel{ padding:16px; }
  }

  @media print{
    .sidebar, .header-meta, .report-grid, .report-actions, .pagination, .toast, .logout-overlay{ display:none !important; }
    .header{ border-bottom-right-radius:0; }
    .body{ margin-top:0; padding:0; }
  }
</style>
</head>
<body>

<div class="dashboard">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="logo" id="sidebarToggle" title="Toggle menu" aria-label="Toggle sidebar menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2l4 4-3 3 2 2-9 9-4-4 9-9 2 2 3-3"/><path d="M8 15l1 1"/></svg>
      </button>
      <div class="brand-logo">
        <img src="/logo.png" alt="Sunshine Pediatric Clinic logo" onerror="this.style.display='none'">
      </div>
    </div>
    <div id="sidebarNav"></div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <header class="header">
      <h1>Reports</h1>
      <div class="header-meta" id="headerMeta"></div>
    </header>

    <div class="body">

      <div class="report-grid" id="reportGrid"></div>

      <div class="card report-panel" id="reportPanel"></div>

    </div>
  </div>

</div>

<div class="logout-overlay" id="logoutOverlay">
  <div class="logout-modal">
    <div class="logout-modal-icon"></div>
    <h3>Log out?</h3>
    <p>Are you sure you want to log out of your account?</p>
    <div class="logout-modal-actions">
      <button class="btn btn-outline" id="logoutCancelBtn">Cancel</button>
      <button class="btn btn-danger" id="logoutConfirmBtn">Logout</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function fmtDate(offsetDays){
  const d = new Date(2026, 6, 7 + offsetDays); // July 2026 base
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${String(d.getDate()).padStart(2,"0")} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function genRows(spec, n){
  const rows = [];

}

let activeReportKey = reports[0].key;
const PAGE_SIZE = 6;
let currentPageNum = 1;

/* =========================================================
   RENDER: report cards
========================================================= */
const reportGrid = document.getElementById("reportGrid");

function renderReportGrid(){
  reportGrid.innerHTML = "";
  reports.forEach(r => {
    const div = document.createElement("div");

      </div>
    `;

      if (activeReportKey === r.key) return;

      currentPageNum = 1;
      renderReportGrid();
      renderReportPanel();
    });

/* =========================================================
   RENDER: report detail panel + pagination
========================================================= */
const reportPanel = document.getElementById("reportPanel");

function buildPageButtons(totalPages){
  const btns = [];
  const push = (label, page, opts = {}) => btns.push({ label, page, ...opts });

  push(ICON.chevronLeft, currentPageNum - 1, { disabled: currentPageNum === 1, isNav: true });

  const windowSize = 1;
  for (let p = 1; p <= totalPages; p++){
    if (p === 1 || p === totalPages || Math.abs(p - currentPageNum) <= windowSize){
      push(String(p), p, { active: p === currentPageNum });
    } else if (btns[btns.length - 1] && btns[btns.length - 1].label !== "…"){
      push("…", null, { disabled: true });
    }
  }

  push(ICON.chevronRight, currentPageNum + 1, { disabled: currentPageNum === totalPages, isNav: true });
  return btns;
}

function renderReportPanel(){
  const r = reports.find(x => x.key === activeReportKey);
  const totalRows = r.rows.length;
  const totalPages = Math.max(1, Math.ceil(totalRows / PAGE_SIZE));
  currentPageNum = Math.min(currentPageNum, totalPages);

  const start = (currentPageNum - 1) * PAGE_SIZE;
  const pageRows = r.rows.slice(start, start + PAGE_SIZE);

  const theadHTML = `<tr>${r.columns.map(c => `<th>${c}</th>`).join("")}</tr>`;
  const tbodyHTML = pageRows.length ? pageRows.map(row => {
    const cells = row.slice(0, -1).map(c => `<td>${c}</td>`).join("");
    const statusRaw = row[row.length - 1];
    const badge = `<td><span class="badge ${r.statusClass(statusRaw)}">${r.statusLabel(statusRaw)}</span></td>`;
    return `<tr>${cells}${badge}</tr>`;
  }).join("") : `<tr><td colspan="${r.columns.length}"><div class="empty-note">No records found.</div></td></tr>`;

  const rangeStart = totalRows === 0 ? 0 : start + 1;
  const rangeEnd = Math.min(start + PAGE_SIZE, totalRows);

  const pageBtns = buildPageButtons(totalPages);
  const pageBtnsHTML = pageBtns.map((b, idx) => `
    <button class="page-btn${b.active ? " active" : ""}" data-page="${b.page ?? ""}" ${b.disabled ? "disabled" : ""} aria-label="${b.isNav ? (idx === 0 ? "Previous page" : "Next page") : "Page " + b.label}">${b.label}</button>
  `).join("");

  reportPanel.innerHTML = `
    <div class="report-panel-head">
      <div>
        <div class="report-panel-title">${r.label}</div>
        <div class="report-panel-sub">${rangeStart}–${rangeEnd} of ${totalRows} records &middot; updated just now</div>
      </div>
      <div class="report-actions">
        <button class="btn btn-outline" id="printBtn">${ICON.printer} Print</button>
        <button class="btn btn-outline" id="exportPdfBtn">${ICON.file} Export PDF</button>
        <button class="btn btn-success" id="downloadExcelBtn">${ICON.sheet} Download Excel</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>${theadHTML}</thead>
        <tbody>${tbodyHTML}</tbody>
      </table>
    </div>
    <div class="pagination">
      <div class="pagination-info">Showing ${rangeStart}-${rangeEnd} of ${totalRows}</div>
      <div class="pagination-controls">${pageBtnsHTML}</div>
    </div>
  `;

  document.getElementById("printBtn").addEventListener("click", () => window.print());
  document.getElementById("exportPdfBtn").addEventListener("click", () => exportReportAsPdf(r));
  document.getElementById("downloadExcelBtn").addEventListener("click", () => exportReportAsExcel(r));

  reportPanel.querySelectorAll(".page-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const page = btn.getAttribute("data-page");
      if (!page) return;
      const p = parseInt(page, 10);
      if (Number.isNaN(p) || p < 1 || p > totalPages || p === currentPageNum) return;
      currentPageNum = p;
      renderReportPanel();
    });
  });
}

/* =========================================================
   EXPORTS: Excel + PDF (full dataset, not just current page)
========================================================= */
function exportReportAsExcel(r){
  try{
    const header = r.columns;
    const body = r.rows.map(row => {
      const cells = row.slice(0, -1);
      const status = r.statusLabel(row[row.length - 1]);
      return [...cells, status];
    });
    const ws = XLSX.utils.aoa_to_sheet([header, ...body]);
    ws["!cols"] = header.map(() => ({ wch: 18 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, r.label.slice(0, 31));
    const filename = `${r.label.replace(/\s+/g, "_")}_${fmtDate(0).replace(/\s+/g, "_")}.xlsx`;
    XLSX.writeFile(wb, filename);
    showToast(`${r.label} downloaded as Excel`);
  }catch(err){
    console.error(err);
    showToast("Could not generate Excel file");
  }
}

function exportReportAsPdf(r){
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });
    doc.setFontSize(14);
    doc.text(r.label, 14, 16);
    doc.setFontSize(10);
    doc.setTextColor(139, 133, 166);
    doc.text(`Sunshine Pediatric Clinic  |  Generated ${fmtDate(0)}  |  ${r.rows.length} records`, 14, 22);

    const body = r.rows.map(row => {
      const cells = row.slice(0, -1);
      const status = r.statusLabel(row[row.length - 1]);
      return [...cells, status];
    });

    doc.autoTable({
      head: [r.columns],
      body,
      startY: 28,
      styles: { fontSize: 8, cellPadding: 3 },
      headStyles: { fillColor: [108, 99, 255], textColor: 255 },
      alternateRowStyles: { fillColor: [243, 241, 252] }
    });

    const filename = `${r.label.replace(/\s+/g, "_")}_${fmtDate(0).replace(/\s+/g, "_")}.pdf`;
    doc.save(filename);
    showToast(`${r.label} exported as PDF`);
  }catch(err){
    console.error(err);
    showToast("Could not generate PDF file");
  }
}
