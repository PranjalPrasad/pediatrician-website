<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reports | Pediatric Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="/auth.js"></script>

<style>
  :root{
    --primary:#6C63FF;
    --secondary:#4F8EF7;
    --accent:#A78BFA;
    --bg:#F3F1FC;
    --card:#FFFFFF;
    --success:#14B8A6;
    --warning:#FBBF24;
    --danger:#FF6F91;
    --text:#241E3D;
    --muted:#8B85A6;
    --border:#ECE8F9;
    --hover:#F1EDFC;
    --header-from:#FFFFFF;
    --header-to:#FFFFFF;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:'Inter', sans-serif;
    background:linear-gradient(135deg, #E9FBF2 0%, #EEF6F9 25%, #F1EDFC 60%, #FBEFF6 100%);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  .dashboard{ display:flex; width:100%; min-height:100vh; }

  /* ============ SIDEBAR ============ */
  .sidebar{
    width:72px; flex-shrink:0;
    background:linear-gradient(180deg, var(--header-from), var(--header-to));
    border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center;
    padding:20px 0; gap:14px; overflow:hidden;
    transition:width 0.28s ease, padding 0.28s ease;
  }
  .sidebar.expanded{ width:220px; align-items:stretch; padding:20px 14px; overflow-y:auto; }
  .sidebar-header{ display:flex; align-items:center; gap:10px; margin-bottom:8px; align-self:center; width:100%; justify-content:center; overflow:hidden; }
  .sidebar.expanded .sidebar-header{ justify-content:flex-start; }
  .sidebar .logo{ width:34px; height:34px; border-radius:50%; background:rgba(108,99,255,0.10); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background 0.2s ease; border:none; }
  .sidebar .logo:hover{ background:rgba(108,99,255,0.18); }
  .brand-logo{ display:none; align-items:center; gap:8px; overflow:hidden; white-space:nowrap; }
  .sidebar.expanded .brand-logo{ display:flex; }
  .brand-logo img{ height:26px; width:auto; max-width:120px; object-fit:contain; flex-shrink:0; }
  .brand-logo span{ font-size:13px; font-weight:700; color:var(--text); letter-spacing:0.2px; }

  .sidebar .nav-item{
    width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); cursor:pointer; transition:background 0.2s ease, color 0.2s ease, width 0.2s ease;
    background:transparent; border:none; align-self:center; flex-shrink:0; gap:12px; overflow:hidden;
    white-space:nowrap; text-decoration:none;
  }
  .sidebar.expanded .nav-item{ width:100%; justify-content:flex-start; padding:0 10px; align-self:stretch; }
  .sidebar .nav-item:hover{ background:rgba(108,99,255,0.08); }
  .sidebar .nav-item.active{ background:var(--primary); color:#FFFFFF; }
  .sidebar svg{ width:17px; height:17px; flex-shrink:0; }
  .nav-label{ display:none; font-size:13px; font-weight:500; }
  .sidebar.expanded .nav-label{ display:inline-block; }

  .nav-group{ width:100%; }
  .nav-parent{
    width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); cursor:pointer; transition:background 0.2s ease, color 0.2s ease, width 0.2s ease;
    background:transparent; border:none; align-self:center; flex-shrink:0; gap:12px; overflow:hidden;
    white-space:nowrap; text-decoration:none;
  }
  .sidebar.expanded .nav-parent{ width:100%; justify-content:flex-start; padding:0 10px; align-self:stretch; }
  .nav-parent:hover{ background:rgba(108,99,255,0.08); }
  .nav-parent.active{ background:var(--primary); color:#FFFFFF; }
  .nav-parent .nav-chevron{ display:none; margin-left:auto; transition:transform 0.2s ease; width:12px; height:12px; }
  .sidebar.expanded .nav-parent .nav-chevron{ display:inline-block; }
  .nav-parent.open .nav-chevron{ transform:rotate(180deg); }
  .nav-submenu{ display:none; flex-direction:column; gap:4px; padding-left:10px; margin-top:2px; }
  .sidebar.expanded .nav-group.open .nav-submenu{ display:flex; }
  .nav-subitem{ display:flex; align-items:center; gap:10px; padding:7px 10px 7px 28px; border-radius:10px; font-size:12.5px; color:var(--muted); text-decoration:none; transition:background 0.2s ease, color 0.2s ease; }
  .nav-subitem:hover{ background:rgba(108,99,255,0.08); color:var(--text); }
  .nav-subitem.active{ background:var(--hover); color:var(--primary); font-weight:600; }
  .nav-subitem .dot-sm{ width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }

  /* ============ MAIN ============ */
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .header{ background:linear-gradient(120deg, var(--header-from), var(--header-to)); border-bottom-right-radius:40px; padding:28px 32px 40px 32px; }
  .header h1{ color:var(--text); font-size:24px; font-weight:700; margin-bottom:10px; }
  .header-meta{ display:flex; align-items:center; gap:18px; font-size:13px; color:var(--muted); flex-wrap:wrap; }
  .header-meta span{ display:flex; align-items:center; gap:6px; }
  .header-meta svg{ width:14px; height:14px; }

  .body{ flex:1; padding:0 32px 32px 32px; margin-top:-24px; }

  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    box-shadow:0 2px 10px rgba(30,41,59,0.04);
    transition:transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.28s ease;
  }

  /* ============ REPORT CARDS ============ */
  .report-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
    gap:16px;
    margin-bottom:24px;
  }
  .report-card{
    padding:18px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:10px;
    border:1px solid var(--border);
  }
  .report-card:hover{ transform:translateY(-5px) scale(1.02); box-shadow:0 14px 28px rgba(30,41,59,0.12); }
  .report-card.active{ border-color:var(--primary); box-shadow:0 8px 22px rgba(108,99,255,0.18); }

  .report-icon{
    width:40px; height:40px; border-radius:12px; background:var(--hover); color:var(--primary);
    display:flex; align-items:center; justify-content:center;
  }
  .report-icon svg{ width:19px; height:19px; }

  .report-card-title{ font-size:14.5px; font-weight:600; color:var(--text); }
  .report-card-sub{ font-size:12px; color:var(--muted); }
  .report-card-count{ font-size:22px; font-weight:700; color:var(--text); }

  .report-card-open{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; font-weight:600; color:var(--primary);
    margin-top:auto;
  }
  .report-card-open svg{ width:13px; height:13px; }

  /* ============ REPORT DETAIL PANEL ============ */
  .report-panel{ padding:22px; }
  .report-panel-head{
    display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:18px;
  }
  .report-panel-title{ font-size:17px; font-weight:700; color:var(--text); }
  .report-panel-sub{ font-size:12.5px; color:var(--muted); margin-top:3px; }

  .report-actions{ display:flex; gap:10px; flex-wrap:wrap; }
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    padding:9px 16px; font-size:13px; font-weight:600; border-radius:10px; cursor:pointer; border:none;
    transition:opacity 0.2s ease, background 0.2s ease, transform 0.15s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn svg{ width:14px; height:14px; }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-primary:hover{ opacity:0.9; }
  .btn-outline{ background:#fff; color:var(--text); border:1px solid var(--border); }
  .btn-outline:hover{ background:var(--bg); }
  .btn-success{ background:var(--success); color:#fff; }
  .btn-success:hover{ opacity:0.9; }

  .filter-bar{
    display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;
  }
  .filter-chip{
    padding:7px 14px; font-size:12.5px; font-weight:500; border-radius:999px;
    border:1px solid var(--border); background:var(--bg); color:var(--muted); cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .filter-chip:hover{ background:var(--hover); }
  .filter-chip.active{ background:var(--primary); color:#fff; border-color:var(--primary); }

  table{ width:100%; border-collapse:collapse; }
  thead th{
    text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:0.4px;
    color:var(--muted); padding:10px 12px; border-bottom:1px solid var(--border);
  }
  tbody td{ padding:12px; font-size:13px; color:var(--text); border-bottom:1px solid var(--border); }
  tbody tr:hover{ background:var(--hover); }
  tbody tr:last-child td{ border-bottom:none; }

  .badge{
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:600;
  }
  .badge-success{ background:rgba(20,184,166,0.12); color:var(--success); }
  .badge-warning{ background:rgba(251,191,36,0.15); color:#B7791F; }
  .badge-danger{ background:rgba(255,111,145,0.12); color:var(--danger); }
  .badge-info{ background:rgba(79,142,247,0.12); color:var(--secondary); }

  .table-wrap{ overflow-x:auto; }

  .empty-note{ font-size:13px; color:var(--muted); text-align:center; padding:30px 0; }

  /* ============ LOGOUT OVERLAY ============ */
  .logout-overlay{ position:fixed; inset:0; background:rgba(36,30,61,0.45); display:none; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(2px); }
  .logout-overlay.show{ display:flex; }
  .logout-modal{ background:var(--card); border-radius:18px; padding:28px; width:320px; max-width:90vw; box-shadow:0 20px 50px rgba(30,41,59,0.25); text-align:center; animation:logoutPop 0.2s ease; }
  @keyframes logoutPop{ from{ transform:scale(0.92); opacity:0; } to{ transform:scale(1); opacity:1; } }
  .logout-modal-icon{ width:52px; height:52px; border-radius:50%; background:rgba(255,111,145,0.12); color:var(--danger); display:flex; align-items:center; justify-content:center; margin:0 auto 16px auto; }
  .logout-modal-icon svg{ width:24px; height:24px; }
  .logout-modal h3{ font-size:17px; font-weight:700; color:var(--text); margin-bottom:8px; }
  .logout-modal p{ font-size:13px; color:var(--muted); margin-bottom:22px; line-height:1.5; }
  .logout-modal-actions{ display:flex; gap:10px; }
  .logout-modal-actions .btn{ flex:1; justify-content:center; }
  .btn-danger{ background:var(--danger); color:#fff; }
  .btn-danger:hover{ opacity:0.9; }

  /* ============ TOAST ============ */
  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--text); color:#fff;
    padding:12px 18px; border-radius:12px; font-size:13px; font-weight:500;
    box-shadow:0 10px 30px rgba(0,0,0,0.2); display:flex; align-items:center; gap:8px;
    transform:translateY(20px); opacity:0; pointer-events:none; transition:all 0.25s ease; z-index:2000;
  }
  .toast.show{ transform:translateY(0); opacity:1; }
  .toast svg{ width:16px; height:16px; color:var(--success); }

  @media (max-width: 720px){
    .report-panel-head{ flex-direction:column; }
  }
</style>
</head>
<body>

<div class="dashboard">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="logo" id="sidebarToggle" title="Toggle menu" aria-label="Toggle sidebar menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2l4 4-3 3 2 2-9 9-4-4 9-9 2 2 3-3"/><path d="M8 15l1 1"/></svg>
      </button>
      <div class="brand-logo">
        <img src="/logo.png" alt="Sunshine Pediatric Clinic logo" onerror="this.style.display='none'">
      </div>
    </div>
    <div id="sidebarNav"></div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <header class="header">
      <h1>Reports</h1>
      <div class="header-meta" id="headerMeta"></div>
    </header>

    <div class="body">

      <div class="report-grid" id="reportGrid"></div>

      <div class="card report-panel" id="reportPanel"></div>

    </div>
  </div>

</div>

<div class="logout-overlay" id="logoutOverlay">
  <div class="logout-modal">
    <div class="logout-modal-icon"></div>
    <h3>Log out?</h3>
    <p>Are you sure you want to log out of your account?</p>
    <div class="logout-modal-actions">
      <button class="btn btn-outline" id="logoutCancelBtn">Cancel</button>
      <button class="btn btn-danger" id="logoutConfirmBtn">Logout</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

  // protectPage();
/* =========================================================
   ICON LIBRARY
========================================================= */
const ICON = {
  home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>`,
  users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.5 3-6 6.5-6s6.5 2.5 6.5 6"/><circle cx="17" cy="9" r="2.6"/><path d="M15 20c0-2.4 1-4.2 2.7-5.2"/></svg>`,
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/></svg>`,
  syringe: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2l4 4-3 3-2-2"/><path d="M17 7l-9.5 9.5"/><path d="M4 20l2.5-2.5"/><path d="M9 12l3 3M11 10l3 3"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5 5-5.5"/></svg>`,
  ruler: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="8" rx="1.5"/><path d="M7 8v3M11 8v3M15 8v3"/></svg>`,
  activity: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 7 4-14 2 7h6"/></svg>`,
  clipboard: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h6"/></svg>`,
  file: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h9l5 5v15H6z"/><path d="M15 2v5h5"/></svg>`,
  receipt: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2h14v20l-3-2-2 2-2-2-2 2-2-2-3 2z"/><path d="M8 8h8M8 12h8"/></svg>`,
  settings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a7.7 7.7 0 000-3l2-1.5-2-3.4-2.3.9a7.5 7.5 0 00-2.6-1.5L14 2h-4l-.5 2.5a7.5 7.5 0 00-2.6 1.5l-2.3-.9-2 3.4 2 1.5a7.7 7.7 0 000 3l-2 1.6 2 3.4 2.3-1a7.5 7.5 0 002.6 1.5L10 22h4l.5-2.5a7.5 7.5 0 002.6-1.5l2.3 1 2-3.4z"/></svg>`,
  user: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/></svg>`,
  userPlus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="4"/><path d="M2 21c0-4 3-7 7-7s7 3 7 7"/><path d="M18 8v6M15 11h6"/></svg>`,
  stethoscope: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3v6a4 4 0 004 4 4 4 0 004-4V3"/><path d="M12 13v3a5 5 0 005 5 5 5 0 005-5"/><circle cx="20" cy="6" r="2"/></svg>`,
  chevron: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>`,
  chevronRight: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>`,
  logout: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>`,
  download: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/></svg>`,
  printer: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6"/><rect x="4" y="9" width="16" height="8" rx="1.5"/><path d="M6 17v4h12v-4"/></svg>`,
  sheet: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>`,
  checkCircle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5 5-5.5"/></svg>`
};

/* =========================================================
   SIDEBAR
========================================================= */
const sidebarItems = [
  { type: "link",  icon: ICON.home,        label: "Dashboard",         href: "dashboard.html" },
  { type: "group", icon: ICON.users,       label: "Children",         key: "children", children: [
      { label: "All Children",   href: "child registration/all-children/childp.html" },
      { label: "Register Child", href: "child registration/registerchild/registerchild.html" }
    ]
  },
  { type: "link",  icon: ICON.calendar,    label: "Appointments",      href: "appointment/appointment.html" },
  { type: "link",  icon: ICON.stethoscope, label: "Consultations",     href: "consultation/opd.html" },
  { type: "link",  icon: ICON.clipboard,   label: "Prescriptions",     href: "prescription/prescription.html" },
  { type: "link",  icon: ICON.syringe,     label: "Vaccinations",      href: "vaccination.html" },
  { type: "link",  icon: ICON.activity,    label: "Growth Monitoring", href: "Growth/growth.html" },
  { type: "link",  icon: ICON.file,        label: "Reports",           href: "reports.html" },
  { type: "link",  icon: ICON.receipt,     label: "Billing",           href: "billing.html" },
  { type: "link",  icon: ICON.userPlus,    label: "User Management",   href: "user/user.html" },
  { type: "action", icon: ICON.logout,     label: "Logout",            action: "logout" }
];

const currentPage = (location.pathname.split("/").pop() || "reports.html").toLowerCase();

document.getElementById("headerMeta").innerHTML = `
  <span>${ICON.calendar} July 7, 2026 &middot; 10:15</span>
  <span>${ICON.user} Dr. Ananya Sharma</span>
  <span>${ICON.activity} Sunshine Pediatric Clinic</span>
`;

const sidebarNav = document.getElementById("sidebarNav");
sidebarNav.style.display = "contents";

sidebarItems.forEach(item => {
  if (item.type === "link") {
    const a = document.createElement("a");
    const isActive = item.href.toLowerCase() === currentPage;
    a.className = "nav-item" + (isActive ? " active" : "");
    a.href = item.href;
    a.title = item.label;
    a.innerHTML = item.icon + `<span class="nav-label">${item.label}</span>`;
    sidebarNav.appendChild(a);
    return;
  }
  if (item.type === "action") {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "nav-item";
    btn.title = item.label;
    btn.innerHTML = item.icon + `<span class="nav-label">${item.label}</span>`;
    btn.addEventListener("click", () => { 
        if (item.action === "logout") logout(); 
    });
    sidebarNav.appendChild(btn);
    return;
}
  const childActive = item.children.some(c => c.href.toLowerCase() === currentPage);
  const group = document.createElement("div");
  group.className = "nav-group" + (childActive ? " open" : "");
  const parent = document.createElement("button");
  parent.type = "button";
  parent.className = "nav-parent" + (childActive ? " active" : "");
  parent.title = item.label;
  parent.innerHTML = item.icon + `<span class="nav-label">${item.label}</span>` + `<span class="nav-chevron">${ICON.chevron}</span>`;
  parent.addEventListener("click", () => { group.classList.toggle("open"); parent.classList.toggle("open"); });
  const submenu = document.createElement("div");
  submenu.className = "nav-submenu";
  item.children.forEach(c => {
    const a = document.createElement("a");
    const isActive = c.href.toLowerCase() === currentPage;
    a.className = "nav-subitem" + (isActive ? " active" : "");
    a.href = c.href;
    a.innerHTML = `<span class="dot-sm"></span>${c.label}`;
    submenu.appendChild(a);
  });
  group.appendChild(parent);
  group.appendChild(submenu);
  sidebarNav.appendChild(group);
});

let activeReportKey = reports[0].key;

/* =========================================================
   RENDER: report cards
========================================================= */
const reportGrid = document.getElementById("reportGrid");

function renderReportGrid(){
  reportGrid.innerHTML = "";
  reports.forEach(r => {
    const div = document.createElement("div");
    div.className = "card report-card" + (r.key === activeReportKey ? " active" : "");
    div.innerHTML = `
      <div class="report-icon">${r.icon}</div>
      <div>
        <div class="report-card-count">${r.count}</div>
        <div class="report-card-title">${r.label}</div>
        <div class="report-card-sub">${r.sub}</div>
      </div>
      <div class="report-card-open">Open Report ${ICON.chevronRight}</div>
    `;
    div.addEventListener("click", () => {
      activeReportKey = r.key;
      renderReportGrid();
      renderReportPanel();
    });
    reportGrid.appendChild(div);
  });
}

/* =========================================================
   RENDER: report detail panel
========================================================= */
const reportPanel = document.getElementById("reportPanel");

function renderReportPanel(){
  const r = reports.find(x => x.key === activeReportKey);

  const theadHTML = `<tr>${r.columns.map(c => `<th>${c}</th>`).join("")}</tr>`;
  const tbodyHTML = r.rows.map(row => {
    const cells = row.slice(0, -1).map(c => `<td>${c}</td>`).join("");
    const statusRaw = row[row.length - 1];
    const badge = `<td><span class="badge ${r.statusClass(statusRaw)}">${r.statusLabel(statusRaw)}</span></td>`;
    return `<tr>${cells}${badge}</tr>`;
  }).join("");

  reportPanel.innerHTML = `
    <div class="report-panel-head">
      <div>
        <div class="report-panel-title">${r.label}</div>
        <div class="report-panel-sub">${r.rows.length} of ${r.count} records shown &middot; updated just now</div>
      </div>
      <div class="report-actions">
        <button class="btn btn-outline" id="printBtn">${ICON.printer} Print</button>
        <button class="btn btn-outline" id="exportPdfBtn">${ICON.file} Export PDF</button>
        <button class="btn btn-success" id="downloadExcelBtn">${ICON.sheet} Download Excel</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>${theadHTML}</thead>
        <tbody>${tbodyHTML}</tbody>
      </table>
    </div>
  `;

  document.getElementById("printBtn").addEventListener("click", () => window.print());
  document.getElementById("exportPdfBtn").addEventListener("click", () => showToast(`${r.label} exported as PDF`));
  document.getElementById("downloadExcelBtn").addEventListener("click", () => showToast(`${r.label} downloaded as Excel`));
}

renderReportGrid();
